services:
  db:
    image: postgres:16-alpine
    container_name: pods-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: pods
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pods_secure_password_change_me}
      POSTGRES_DB: pods_db
    volumes:
      - pods_pgdata_prod:/var/lib/postgresql/data
    networks:
      - pods-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pods-web
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      DATABASE_URL: "postgresql://pods:${POSTGRES_PASSWORD:-pods_secure_password_change_me}@db:5432/pods_db?schema=public"
      NEXTAUTH_URL: "https://pods.srv1528810.hstgr.cloud"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NEXT_PUBLIC_APP_URL: "https://pods.srv1528810.hstgr.cloud"
    depends_on:
      - db
    networks:
      - pods-network

volumes:
  pods_pgdata_prod:

networks:
  pods-network:
    driver: bridge
